name: Build Port ZIPs

on:
  workflow_dispatch:
    inputs:
      port:
        description: 'Port name(s) to build: single name, comma-separated list, or "all"'
        required: true
        default: 'all'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Job 1: resolve port list ──────────────────────────────────────────────────
  setup:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends jq
          git rev-parse HEAD

      - name: Resolve port selector
        id: resolve
        run: |
          PORT_INPUT="${{ github.event_name == 'push' && 'all' || inputs.port }}"
          echo "Port selector: $PORT_INPUT"

          PLAYABLE=$(bash ci/discover-ports.sh README.md . 2>/dev/null | jq -c '.')
          echo "Playable: $PLAYABLE"

          if [ "$PORT_INPUT" = "all" ]; then
            MATRIX="$PLAYABLE"
          else
            IFS=',' read -ra REQUESTED <<< "$PORT_INPUT"
            VALID='[]'
            ERRORS=()
            for name in "${REQUESTED[@]}"; do
              name=$(echo "$name" | tr -d ' ')
              if echo "$PLAYABLE" | jq -e --arg n "$name" 'index($n) != null' >/dev/null; then
                VALID=$(echo "$VALID" | jq -c --arg n "$name" '. + [$n]')
              else
                ERRORS+=("$name")
              fi
            done
            if [ ${#ERRORS[@]} -gt 0 ]; then
              echo "ERROR: not in playable list: ${ERRORS[*]}" >&2
              exit 1
            fi
            MATRIX="$VALID"
          fi

          echo "matrix=$(echo "$MATRIX" | jq -c '.')" >> "$GITHUB_OUTPUT"

  # ── Job 2: build each port ────────────────────────────────────────────────────
  build:
    needs: [setup]
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        port: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cross-compiler and arm64 dev headers
        run: |
          sudo apt-get update -qq

          # Cross-compiler (installs sysroot at /usr/aarch64-linux-gnu)
          sudo apt-get install -y --no-install-recommends \
            gcc-10-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            libc6-dev-arm64-cross \
            libgcc-10-dev-arm64-cross \
            jq zip file binutils python3

          # Add arm64 architecture to get arm64 dev packages
          sudo dpkg --add-architecture arm64
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main universe" \
            | sudo tee /etc/apt/sources.list.d/arm64-ports.list
          sudo apt-get update -qq 2>/dev/null || true

          # Install arm64 dev headers into /usr/include and /usr/lib/aarch64-linux-gnu
          sudo apt-get install -y --no-install-recommends \
            libsdl2-dev:arm64 \
            libegl-dev:arm64 \
            libgles2-mesa-dev:arm64 \
            libfreetype-dev:arm64 \
            libstdc++-10-dev:arm64 2>/dev/null || {
            echo "arm64 packages unavailable — copying host headers into sysroot"
            sudo apt-get install -y --no-install-recommends \
              libsdl2-dev libegl-dev libgles2-mesa-dev libfreetype-dev
            SR=/usr/aarch64-linux-gnu
            sudo mkdir -p "$SR/include"
            for inc in SDL2 EGL GLES2 GLES freetype2; do
              [ -d "/usr/include/$inc" ] && sudo cp -r "/usr/include/$inc" "$SR/include/" || true
            done
            [ -f /usr/include/ft2build.h ] && sudo cp /usr/include/ft2build.h "$SR/include/" || true
          }

          # Verify
          echo "=== Sysroot check ==="
          ls /usr/aarch64-linux-gnu/include/stdio.h
          ls /usr/aarch64-linux-gnu/include/SDL2/SDL.h 2>/dev/null \
            || ls /usr/include/SDL2/SDL.h \
            || { echo "ERROR: SDL2 headers missing"; exit 1; }

          # Fix missing headers: arm64 packages put some files in /usr/include
          # but --sysroot only searches /usr/aarch64-linux-gnu/include.
          # Copy the missing pieces into the sysroot include path.
          SR=/usr/aarch64-linux-gnu/include
          sudo mkdir -p "$SR/KHR" "$SR/SDL2" "$SR/freetype2"

          # KHR/khrplatform.h
          [ -f "$SR/KHR/khrplatform.h" ] || \
            sudo cp /usr/include/KHR/khrplatform.h "$SR/KHR/" 2>/dev/null || \
            sudo apt-get install -y --no-install-recommends libkhrplatform-dev 2>/dev/null && \
            sudo cp /usr/include/KHR/khrplatform.h "$SR/KHR/" 2>/dev/null || true

          # SDL2/_real_SDL_config.h and full SDL2 headers
          [ -f "$SR/SDL2/_real_SDL_config.h" ] || \
            sudo cp -r /usr/include/SDL2/. "$SR/SDL2/" 2>/dev/null || true

          # ft2build.h and freetype2/
          [ -f "$SR/ft2build.h" ] || \
            sudo cp /usr/include/ft2build.h "$SR/" 2>/dev/null || true
          sudo cp -r /usr/include/freetype2/. "$SR/freetype2/" 2>/dev/null || true

          echo "=== Final header check ==="
          ls "$SR/KHR/khrplatform.h"   && echo "KHR: OK"     || echo "KHR: MISSING"
          ls "$SR/SDL2/_real_SDL_config.h" && echo "SDL2 config: OK" || echo "SDL2 config: MISSING"
          ls "$SR/ft2build.h"          && echo "freetype: OK" || echo "freetype: MISSING"
          aarch64-linux-gnu-gcc-10 --version

      - name: Set CC and SR
        run: |
          echo "CC=$(command -v aarch64-linux-gnu-gcc-10)" >> "$GITHUB_ENV"
          echo "SR=/usr/aarch64-linux-gnu" >> "$GITHUB_ENV"

      - name: Compile port
        run: bash ci/build-port.sh "${{ matrix.port }}"

      - name: Check binary quality gates
        run: |
          bash ci/check-binary.sh \
            "${{ matrix.port }}" \
            "ports/${{ matrix.port }}/${{ matrix.port }}"

      - name: Assemble PortMaster zip
        run: |
          mkdir -p dist
          bash ci/assemble-zip.sh \
            "${{ matrix.port }}" \
            "ports/${{ matrix.port }}/${{ matrix.port }}" \
            dist

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.port }}-portmaster-zip
          path: dist/*.zip
          retention-days: 14

  # ── Job 3: GitHub Release (v* tags only) ─────────────────────────────────────
  release:
    needs: [build]
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all port zips
        uses: actions/download-artifact@v4
        with:
          pattern: '*-portmaster-zip'
          path: release-zips
          merge-multiple: true

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release create "$TAG" \
            --title "NextOS Ports $TAG" \
            --generate-notes 2>/dev/null || true
          for zip_file in release-zips/*.zip; do
            [ -f "$zip_file" ] || continue
            gh release upload "$TAG" "$zip_file" --clobber
          done

  # ── Job 4: Summary (always) ───────────────────────────────────────────────────
  summary:
    needs: [build]
    runs-on: ubuntu-22.04
    if: always()
    steps:
      - name: Write summary
        env:
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          {
            echo "## Port Build Results"
            echo "| Port | Outcome |"
            echo "|------|---------|"
            if [ "$BUILD_RESULT" = "success" ]; then
              echo "| all selected ports | ✅ built |"
            else
              echo "| one or more ports | ❌ $BUILD_RESULT — see job logs |"
            fi
            echo ""
            echo "> Download zips from the **Artifacts** section above. Retained 14 days."
          } >> "$GITHUB_STEP_SUMMARY"
