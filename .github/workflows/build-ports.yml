name: Build Port ZIPs

on:
  workflow_dispatch:
    inputs:
      port:
        description: 'Port name(s) to build: single name, comma-separated list, or "all"'
        required: true
        default: 'all'
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed for gh release create/upload

jobs:
  # ── Job 1: setup ─────────────────────────────────────────────────────────────
  # Installs the cross-compiler, bootstraps the aarch64 sysroot once,
  # resolves the port selector, and emits the build matrix.
  setup:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cross-compiler and tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-10-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            jq \
            zip \
            file \
            binutils \
            python3
          echo "=== Compiler version ==="
          aarch64-linux-gnu-gcc-10 --version
          echo "=== Git commit ==="
          git rev-parse HEAD

      - name: Build aarch64 sysroot from arm64 deb packages
        run: |
          # Add arm64 architecture and Debian Bullseye sources
          sudo dpkg --add-architecture arm64
          # Add bullseye sources for arm64 packages
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main universe" \
            | sudo tee /etc/apt/sources.list.d/arm64-ports.list
          sudo apt-get update -qq 2>/dev/null || true

          SYSROOT="$(pwd)/ci-sysroot"
          mkdir -p "$SYSROOT"

          # Download arm64 dev packages and extract headers + stub libs
          # We use a temp dir to download .debs then extract with dpkg-deb
          PKGDIR="$(mktemp -d)"

          PACKAGES=(
            libsdl2-dev:arm64
            libegl-dev:arm64
            libgles2-mesa-dev:arm64
            libfreetype-dev:arm64
            libstdc++-10-dev:arm64
            libc6-dev:arm64
            libgcc-10-dev:arm64
            linux-libc-dev:arm64
          )

          echo "Downloading arm64 packages..."
          for pkg in "${PACKAGES[@]}"; do
            apt-get download "$pkg" -o Dir::Cache="$PKGDIR" 2>/dev/null || \
            apt-get download "${pkg%:arm64}" 2>/dev/null || \
            echo "WARN: could not download $pkg, skipping"
          done 2>/dev/null || true

          # Also grab any .deb files apt left in its cache
          find /var/cache/apt/archives/ -name "*arm64*.deb" -exec cp {} "$PKGDIR/" \; 2>/dev/null || true
          ls "$PKGDIR"/*.deb 2>/dev/null | head -5

          echo "Extracting packages into sysroot..."
          for deb in "$PKGDIR"/*.deb; do
            [ -f "$deb" ] || continue
            dpkg-deb --fsys-tarfile "$deb" | tar -x -C "$SYSROOT" 2>/dev/null || true
          done
          rm -rf "$PKGDIR"

          # Fix symlinks — stub .so files in multiarch dir
          MULTIARCH_DIR="$SYSROOT/usr/lib/aarch64-linux-gnu"
          mkdir -p "$MULTIARCH_DIR"

          # Create stub symlinks for linker if missing
          for lib in libSDL2 libEGL libGLESv2 libGL libfreetype libm libdl libpthread libstdc++; do
            so="$MULTIARCH_DIR/${lib}.so"
            [ -f "$so" ] || [ -L "$so" ] || {
              # Find any versioned .so and symlink it
              versioned=$(find "$SYSROOT" -name "${lib}.so.*" -not -type d 2>/dev/null | head -1)
              [ -n "$versioned" ] && ln -sf "$versioned" "$so" || true
            }
          done

          # Verify critical headers exist
          echo "=== Sysroot contents check ==="
          ls "$SYSROOT/usr/include/SDL2/SDL.h" 2>/dev/null && echo "SDL2: OK" || echo "SDL2: MISSING"
          ls "$SYSROOT/usr/include/EGL/egl.h"  2>/dev/null && echo "EGL: OK"  || echo "EGL: MISSING"
          ls "$SYSROOT/usr/include/freetype2/ft2build.h" 2>/dev/null && echo "freetype: OK" || echo "freetype: MISSING"

          # If headers are still missing, fall back to host headers (sufficient for cross-compile)
          if [ ! -f "$SYSROOT/usr/include/SDL2/SDL.h" ]; then
            echo "Falling back to host SDL2 headers..."
            sudo apt-get install -y --no-install-recommends libsdl2-dev libfreetype-dev libegl-dev libgles2-mesa-dev
            mkdir -p "$SYSROOT/usr/include"
            cp -r /usr/include/SDL2 "$SYSROOT/usr/include/" 2>/dev/null || true
            cp -r /usr/include/EGL  "$SYSROOT/usr/include/" 2>/dev/null || true
            cp -r /usr/include/GLES2 "$SYSROOT/usr/include/" 2>/dev/null || true
            cp -r /usr/include/freetype2 "$SYSROOT/usr/include/" 2>/dev/null || true
            cp /usr/include/ft2build.h "$SYSROOT/usr/include/" 2>/dev/null || true
            # For stub libs use the host amd64 libs — the linker only needs them at link time
            mkdir -p "$SYSROOT/usr/lib/aarch64-linux-gnu"
            for lib in SDL2 EGL GLESv2 freetype; do
              find /usr/lib -name "lib${lib}.so*" 2>/dev/null | head -1 | \
                xargs -I{} cp {} "$SYSROOT/usr/lib/aarch64-linux-gnu/" 2>/dev/null || true
            done
          fi

          echo "Sysroot size: $(du -sh $SYSROOT | cut -f1)"
          tar -czf ci-sysroot.tar.gz ci-sysroot/
          echo "Sysroot tarball: $(du -sh ci-sysroot.tar.gz | cut -f1)"

      - name: Upload sysroot artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-sysroot
          path: ci-sysroot.tar.gz
          retention-days: 1

      - name: Discover playable ports and resolve selector
        id: resolve
        run: |
          PORT_INPUT="${{ github.event_name == 'push' && 'all' || inputs.port }}"
          echo "Port selector: $PORT_INPUT"

          # Get full playable list — compact single-line JSON array
          PLAYABLE=$(bash ci/discover-ports.sh README.md . 2>/dev/null | jq -c '.')
          echo "Playable ports: $PLAYABLE"

          if [ "$PORT_INPUT" = "all" ]; then
            MATRIX="$PLAYABLE"
          else
            # Build matrix from comma-separated input, validating each name
            IFS=',' read -ra REQUESTED <<< "$PORT_INPUT"
            VALID='[]'
            ERRORS=()
            for name in "${REQUESTED[@]}"; do
              name=$(echo "$name" | tr -d ' ')
              if echo "$PLAYABLE" | jq -e --arg n "$name" 'index($n) != null' >/dev/null; then
                VALID=$(echo "$VALID" | jq -c --arg n "$name" '. + [$n]')
              else
                ERRORS+=("$name")
              fi
            done
            if [ ${#ERRORS[@]} -gt 0 ]; then
              echo "ERROR: The following ports are not in the playable list: ${ERRORS[*]}" >&2
              echo "Playable ports are: $(echo "$PLAYABLE" | jq -r '.[]' | tr '\n' ' ')" >&2
              exit 1
            fi
            MATRIX="$VALID"
          fi

          # GITHUB_OUTPUT requires single-line values — matrix must be compact JSON
          MATRIX_COMPACT=$(echo "$MATRIX" | jq -c '.')
          echo "Build matrix: $MATRIX_COMPACT"
          echo "matrix=$MATRIX_COMPACT" >> "$GITHUB_OUTPUT"

      - name: Log build info
        run: |
          echo "=== Build Summary ==="
          echo "Trigger:    ${{ github.event_name }}"
          echo "Ref:        ${{ github.ref }}"
          echo "Commit:     $(git rev-parse HEAD)"
          echo "Compiler:   $(aarch64-linux-gnu-gcc-10 --version | head -1)"
          echo "Ports:      ${{ steps.resolve.outputs.matrix }}"

  # ── Job 2: build (matrix per port) ───────────────────────────────────────────
  build:
    needs: [setup]
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        port: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false   # let other ports continue if one fails
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-10-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            binutils \
            jq \
            zip \
            file \
            python3

      - name: Download sysroot
        uses: actions/download-artifact@v4
        with:
          name: ci-sysroot

      - name: Extract sysroot
        run: |
          tar -xzf ci-sysroot.tar.gz
          echo "SR=$(pwd)/ci-sysroot" >> "$GITHUB_ENV"
          echo "CC=aarch64-linux-gnu-gcc-10" >> "$GITHUB_ENV"

      - name: Compile port
        run: |
          bash ci/build-port.sh "${{ matrix.port }}"

      - name: Check binary quality gates
        run: |
          BINARY="ports/${{ matrix.port }}/${{ matrix.port }}"
          bash ci/check-binary.sh "${{ matrix.port }}" "$BINARY"

      - name: Assemble PortMaster zip
        run: |
          mkdir -p dist
          BINARY="ports/${{ matrix.port }}/${{ matrix.port }}"
          bash ci/assemble-zip.sh "${{ matrix.port }}" "$BINARY" dist

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.port }}-portmaster-zip
          path: dist/*.zip
          retention-days: 14

  # ── Job 3: release (only on v* tag pushes) ───────────────────────────────────
  release:
    needs: [build]
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all port zips
        uses: actions/download-artifact@v4
        with:
          pattern: '*-portmaster-zip'
          path: release-zips
          merge-multiple: true

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          # Create release if it doesn't exist; ignore error if it does
          gh release create "$TAG" \
            --title "NextOS Ports $TAG" \
            --generate-notes \
            --draft=false \
            --prerelease=false \
            2>/dev/null || true

          # Upload each zip, overwriting if already exists
          for zip_file in release-zips/*.zip; do
            [ -f "$zip_file" ] || continue
            echo "Uploading: $zip_file"
            gh release upload "$TAG" "$zip_file" --clobber
          done

  # ── Job 4: summary (always runs) ─────────────────────────────────────────────
  summary:
    needs: [build]
    runs-on: ubuntu-22.04
    if: always()
    steps:
      - name: Write job summary
        env:
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'SUMMARY'
          ## Port Build Results

          | Port | Outcome |
          |------|---------|
          SUMMARY

          # Map overall result to emoji
          if [ "$BUILD_RESULT" = "success" ]; then
            echo "| (all selected ports) | ✅ built |" >> "$GITHUB_STEP_SUMMARY"
          elif [ "$BUILD_RESULT" = "failure" ]; then
            echo "| (one or more ports) | ❌ failed — check individual job logs above |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| (all selected ports) | ⏭ $BUILD_RESULT |" >> "$GITHUB_STEP_SUMMARY"
          fi

          cat >> "$GITHUB_STEP_SUMMARY" <<'NOTE'

          > Download individual port zips from the **Artifacts** section at the top of this workflow run page.
          > Each zip is named `<portname>-portmaster-zip` and retained for 14 days.
          NOTE
